<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunta - Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--space bg anim-->
    <div id="starCanvas"></div>

    <!--allows for cloud animation to not break-->
    <div id="cloudCanvas"></div>

    <!--nav bar-->
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-brand">DASHBOARD</a>
        <div class="navbar-action-wrap">
            <button id="themeToggleBtn" class="filter-btn theme-toggle-override">⏾</button>
            <a href="index.html" class="nav-link logout-nav-override">log out</a>
        </div>
    </nav>

    <!--panel layout stuff-->
    <main class="main-container dashboard-container">

    <!-- USER PROFILE HEADER -->

    <section class="contact-form-wrap profile-card">

        <img
            id="userPicture"
            class="profile-picture"
            src="twinkle.png"
            alt="profile">

        <div class="profile-info">

            <h1 id="userName">
                Welcome ✦
            </h1>

            <p id="userEmail">
                loading account...
            </p>

            <p id="studentID">
                Student ID: loading...
            </p>

        </div>

    </section>

        <!--achievement popupsss-->
        <div id="achievementBanner" class="auth-notice-banner-layout">
            <h4 id="achievementTitle" class="auth-notice-heading-layout"></h4>
            <p id="achievementDesc" class="auth-notice-desc-layout"></p>
        </div>

        <!--total trackin gcard-->
        <div class="contact-form-wrap stat-tracking-grid">
            <div>
                <span id="totalHours" class="stat-num stat-num-display">0.0</span>
                <span class="stat-desc">Total Hours Completed</span>
            </div>
            <div>
                <span id="progressPercent" class="stat-num stat-num-progress">0%</span>
                <span id="goalStatusDesc" class="stat-desc">Target Goal: none (¬_¬ )</span>
            </div>
        </div>

        <div class="tab-button-container">
            <button id="tabGoal" class="filter-btn active">GOAL / PROGRESS</button>
            <button id="tabLedger" class="filter-btn">ACTIVITIES / SERVICES</button>
        </div>

        <!--goal +progress bar-->
        <div id="goalSection" class="contact-form-wrap panel-section-wrap">
            <div class="panel-header-block">
                <h2 class="panel-heading panel-title-override">Progress</h2>
            </div>

            <form id="goalForm" class="goal-form-flex-override">
                <div class="input-flex-container">
                    <label for="targetInput" class="label-left-align">target for total hours</label>
                    <input type="number" id="targetInput" class="contact-input input-width-full uniform-height" min="1" placeholder="e.g., 100" required>
                </div>

                <button type="submit" id="goalSubmitBtn" class="btn-send btn-send-goal uniform-height">update goal</button>
            </form>

            <div class="panel-section-wrap">
                <label class="progress-bar-label">progress bar</label>
                <div class="progress-bar-track">
                    <div id="progressBarFill" class="progress-bar-fill-initial"></div>
                </div>
            </div>
        </div>

        <!--spreadsheet bs / activity tracker-->
        <div id="ledgerSection" class="contact-form-wrap panel-section-wrap ledger-section-hidden">
            <div class="panel-header-block">
                <h2 class="panel-heading panel-title-override">Service Spreadsheet</h2>
                <span class="eyebrow panel-eyebrow-override">log all of your activities :)</span>
            </div>

            <form id="activitiesForm" class="activities-logging-grid">
                <div>
                    <label for="actName" class="label-centered">activity title</label>
                    <input type="text" id="actName" class="contact-input input-width-full uniform-height" placeholder="e.g., Beach Clean Up" required>
                </div>
                <div>
                    <label for="actStart" class="label-centered">date</label>
                    <input type="text" id="actStart" class="contact-input compact-date-input uniform-height date-picker-narrow" placeholder="mm/dd/yyyy" required>
                </div>

                <div class="time-contents-wrapper">
                    <div>
                        <label class="time-sublabel">in</label>
                        <input type="text" id="timeIn" class="contact-input mini-time-box uniform-height" placeholder="12:00 pm" required>
                    </div>
                    <div>
                        <label class="time-sublabel">out</label>
                        <input type="text" id="timeOut" class="contact-input mini-time-box uniform-height" placeholder="6:00 pm" required>
                    </div>
                </div>

                <div class="input-width-full">
                    <label for="actType" class="label-centered">type of activity</label>
                    <select id="actType" class="contact-input centered-select select-dropdown-width uniform-height" required>
                        <option value="" disabled selected>Select..</option>
                        <option value="Time-Based">TIMED BASED ACTIVITY</option>
                        <option value="Donation-Based">DONATION BASED ACTIVITY</option>
                    </select>
                </div>
                <div>
                    <label for="actHours" class="label-centered">hours</label>
                    <input type="number" id="actHours" class="contact-input uniform-height hours-input-centered" min="1" max="24" step="0.1" placeholder="0" required>
                </div>

                <button type="submit" id="ledgerSubmitBtn" class="btn-send btn-send-ledger uniform-height">log Activity</button>
            </form>

            <div>
                <h4 class="panel-heading spreadsheet-section-heading"> - .𖥔 SPREADSHEET 𖥔. - </h4>
                <ul id="ledgerList" class="contact-list ledger-list-track">
                    <!--tracking nodes pop out at one in the morning-->
                </ul>
            </div>
        </div>

    </main>

    <footer class="site-footer footer-center">
        <p class="footer-copy"> -ˏ` ✶ ´ˎ- </p>
    </footer>

    <!--bg + spreadsheet-->
    <script src="stars.js"></script>
    <script src="dashboard.js"></script>

</body>
</html>
