<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLUNTA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BACKGROUND -->

<div id="starCanvas"></div>
<div id="cloudCanvas"></div>

<!-- NAVBAR -->

<nav class="navbar">
    <a href="index.html" class="navbar-brand">
        VOLUNTA
    </a>
    
    <div class="navbar-action-wrap">

        <button
            id="themeToggleBtn"
            class="filter-btn theme-toggle-override">
            ⏾

        </button>

        <span class="mood-status">
            get back to grinding bro

        </span>

    </div>
    
</nav>

<main>
    
<!-- =========================
WELCOME INTRO
========================= -->

<section 
    id="welcomeIntro" 
    class="welcome-screen">

    <div class="welcome-content">

        <h1 class="welcome-title">
            Welcome!!

        </h1>
        
        <div class="welcome-gif-placeholder">
            <!--PLACEHOLDER IMG-->
            <img
                src="twinkle.png"
                alt="welcome animation">

        </div>

    </div>

</section>

<!-- =========================
ROLE SELECTION
========================= -->
    
<section 
    id="roleSelection" 
    class="welcome-screen hidden-screen"
    style="display:none;">

    <div class="welcome-content">

        <h1 class="welcome-title">
           ✦ Select your role ✦

        </h1>
        
        <div class="role-card-container">

            <!-- STUDENT -->
            
            <button
                id="studentRoleBtn"
                class="role-card">

                <!--PLACEHOLDER IMG-->
                <img
                    src="twinkle.png" 
                    class="role-placeholder-img"
                    alt="STUDENT">

                <h3>
                    STUDENT

                </h3>
                
                <span class="role-tag beta-tag">
                    BETA
                    
                </span>
                
            </button>

            <!-- SERVICE ORGANIZER -->
            <button
                id="organizerRoleBtn"
                class="role-card">
                <!--PLACEHOLDER IMG-->
                <img
                    src="twinkle.png"
                    class="role-placeholder-img"
                    alt="SERVICE ORGANIZER">

                <h3>
                    SERVICE ORGANIZER

                </h3>

                <span class="role-tag not-started-tag">
                    UNDER MAINTENANCE

                </span>

            </button>

        </div>

    </div>

</section>
    
<!-- =========================
LOGIN SECTION
========================= -->

<section 
    id="authSection" 
    class="contact-form-wrap login-box-dims auth-hidden">
    
<div class="tab-select-container">
    
    <button
        id="tabLogin"
        class="filter-btn active">
        log In

    </button>

    <button
        id="tabRegister"
        class="filter-btn">
        sign Up

    </button>

</div>

<div class="form-header-align">
    
    <h2
        id="formHeading"
        class="panel-heading form-title-override">
        glad you're here!

    </h2>

    <span
        id="formSub"
        class="eyebrow panel-eyebrow-override">
        what's up?
        
    </span>
    
</div>

<div
    id="authNoticeBanner"
    class="contact-form-wrap auth-notice-banner-layout">
    
    <h4
        id="authNoticeTitle"
        class="panel-heading auth-notice-heading-layout">

    </h4>

    <p
        id="authNoticeDesc"
        class="auth-notice-desc-layout">
    </p>
</div>

<form id="authForm">

<div id="schoolGroup" class="hidden-field">

<label for="school">
school

</label>

<select
    id="school"
    class="contact-input input-width-full">
    
<option value="">
select your school

</option>

<option value="Rocklin High School">
Rocklin High School

</option>

<option value="Whitney High School">
Whitney High School

</option>

<option value="Victory High School">
Victory High School

</option>

<option value="Granite Oaks Middle School">
Granite Oaks Middle School

</option>

<option value="Spring View Middle School">
Spring View Middle School

</option>

<option value="Rocklin Independent Charter Academy">
Rocklin Independent Charter Academy
    
</option>
    
</select>

</div>

<div class="form-group-email">

<label for="email">
email address
    
</label>

<input
type="email"
id="email"
class="contact-input input-width-full"
placeholder="student@school.edu"
required>

</div>
    
<div class="form-group-password">

<label for="password">
password

</label>
<input

type="password"
id="password"
class="contact-input input-width-full"
placeholder="𓆝 𓆟 𓆞 𓆝"
required>
</div>

<button
type="submit"
id="submitBtn"
class="btn-send">
Log In

</button>

</form>

</section>
    
</main>

<script src="stars.js"></script>
    
<script src="login.js?v=5"></script>
</body>
    
</html>
