<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLUNTA</title>
<link rel="stylesheet" href="style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!--bg-->

<div id="starCanvas"></div>
<div id="cloudCanvas"></div>

<!--navbar-->

<nav class="navbar">
    <a href="index.html" class="navbar-brand">
        VOLUNTA
    </a>
    
    <div class="navbar-action-wrap">

        <button
            id="themeToggleBtn"
            class="filter-btn theme-toggle-override">
            ⏾
        </button>

        <span class="mood-status">
            work in progress ! 
        </span>

    </div>
    
</nav>

<main>
    
<!--welcome into-->

<section 
    id="welcomeIntro" 
    class="welcome-screen">

    <div class="welcome-content">

        <h1 class="welcome-title">
            Welcome!!
        </h1>
        
        <div class="welcome-gif-placeholder">
            <!--placeholder img-->
            <img
                src="twinkle.png"
                alt="welcome animation">
            
        </div>
    </div>

</section>
<!--choosing role-->    
<section 
    id="roleSelection" 
    class="welcome-screen hidden-screen"
    style="display:none;">

    <div class="welcome-content">

        <h1 class="welcome-title">
           ✦ Select your role ✦
        </h1>
        
        <div class="role-card-container">

            <!--student-->
            
            <button
                id="studentRoleBtn"
                class="role-card">

                <!--placeholder img-->
                <img
                    src="twinkle.png" 
                    class="role-placeholder-img"
                    alt="STUDENT">

                <h3>
                    STUDENT
                </h3>
                
                <span class="role-tag beta-tag">
                    BETA
                </span>
                
            </button>
            <!--service organizer (WILL WORK ON SOON)-->
            <button
                id="organizerRoleBtn"
                class="role-card">
                <!--placeholder img-->
                <img
                    src="twinkle.png"
                    class="role-placeholder-img"
                    alt="SERVICE ORGANIZER">

                <h3>
                    SERVICE ORGANIZER
                </h3>

                <span class="role-tag not-started-tag">
                    BETA
                </span>
            </button>

        </div>
    </div>

</section>    
<!--login section-->
<section 
    id="authSection" 
    class="contact-form-wrap auth-hidden">
    
<div class="form-header-align">

    <h2
        id="formHeading"
        class="panel-heading form-title-override">
        Welcome!
    </h2>

    <span
        id="formSub"
        class="eyebrow panel-eyebrow-override">
        sign in
    </span>

</div>

<div id="authNoticeBanner" class="auth-banner">

    <button
        id="authBannerClose"
        class="auth-banner-close">
        ✕
    </button>

    <h4 id="authNoticeTitle"></h4>

    <p id="authNoticeDesc"></p>

</div>

<!--login details-->

<div class="login-options-container">
    <!--student google login (NOT WORKING ATM)-->
    <div class="login-option-card">

        <h3>
             STUDENT LOGIN
        </h3>

        <p>
            (UNDER MAINTENANCE)
        </p>

        <div
            id="g_id_onload"
            data-client_id="423428817974-s4oq7p4ehbkpn9dtrp1orosh8sbo9cnp.apps.googleusercontent.com"
            data-callback="handleGoogleLogin">
        </div>

        <div
            class="g_id_signin"
            data-type="standard"
            data-size="large"
            data-theme="filled_blue"
            data-text="continue_with"
            data-shape="rectangular">
        </div>
    </div>

    <!--beta users-->

    <div class="login-option-card beta-card">

        <h3>
             BETA TESTING
        </h3>

        <p></p>
            Volunta Beta Testing 
        </p>

        <input
            id="betaEmail"
            type="name"
            class="contact-input input-width-full"
            placeholder="username">

        <input
            id="betaPassword"
            type="password"
            class="contact-input input-width-full"
            placeholder="password">

        <button
            id="betaLoginBtn"
            class="btn-send">
            Beta Login
        </button>
        
    </div>
</div>
    
</section>
</main>
<script src="stars.js"></script>
    
<script src="login.js?v=5"></script>
</body>
    
</html>
