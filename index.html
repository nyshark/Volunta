<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VOLUNTA</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>


<div id="starCanvas"></div>

<nav class="navbar">

        VOLUNTA

            get back to grinding bro

<div class="main-text-side">

    <h1 id="mainBrandTitle" class="main-title">
        ₊✮.VOLUNTA.✮₊

</div>





<div class="contact-form-wrap login-box-dims">



<section id="roleSelection">

    Are you a...

<span class="eyebrow">
    choose your path
</span>

</div>





<div class="role-card-container">


<button id="studentRoleBtn"
        class="role-card">

    🎓
</span>


<span class="role-title">
    Student
</span>

</span>


</button>

</span>


<span class="role-title">

</span>


<span class="role-badge unfinished-badge">
    NOT STARTED
</span>


</button>



</div>


</section>









<section id="authSection" class="auth-hidden">



<div class="tab-select-container">

</button>


<button id="tabRegister"
        class="filter-btn">

    sign Up

</button>


</div>






<div class="form-header-align">

    hi again!

</span>


</div>

</h4>

   class="auth-notice-desc-layout">
</p>


</div>

<label for="email">
email address
</label>


<input id="email"

       placeholder="fish@school.edu"

</div>

password
</label>

</div>

school
</label>

Rocklin High School

</option>

</option>


<option>

</option>


<option>
Spring View Middle School
</option>


<option>
Rocklin Independent Charter Academy
</option>


</select>


</div>






<button id="submitBtn"
        class="btn-send"
        type="submit">

log in

</button>


</form>



</section>





</div>


</main>






<script src="stars.js" defer></script>

<script src="login.js?v=4" defer></script>
