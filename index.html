<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLUNTA</title>
<link rel="stylesheet" href="style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- BACKGROUND -->

<div id="starCanvas"></div>
<div id="cloudCanvas"></div>

<!-- NAVBAR -->

<nav class="navbar">
    <a href="index.html" class="navbar-brand">
        VOLUNTA
    </a>
    
    <div class="navbar-action-wrap">

        <button
            id="themeToggleBtn"
            class="filter-btn theme-toggle-override">
            ⏾

        </button>

        <span class="mood-status">
            get back to grinding bro

        </span>

    </div>
    
</nav>

<main>
    
<!-- =========================
WELCOME INTRO
========================= -->

<section 
    id="welcomeIntro" 
    class="welcome-screen">

    <div class="welcome-content">

        <h1 class="welcome-title">
            Welcome!!

        </h1>
        
        <div class="welcome-gif-placeholder">
            <!--PLACEHOLDER IMG-->
            <img
                src="twinkle.png"
                alt="welcome animation">

        </div>

    </div>

</section>

<!-- =========================
ROLE SELECTION
========================= -->
    
<section 
    id="roleSelection" 
    class="welcome-screen hidden-screen"
    style="display:none;">

    <div class="welcome-content">

        <h1 class="welcome-title">
           ✦ Select your role ✦

        </h1>
        
        <div class="role-card-container">

            <!-- STUDENT -->
            
            <button
                id="studentRoleBtn"
                class="role-card">

                <!--PLACEHOLDER IMG-->
                <img
                    src="twinkle.png" 
                    class="role-placeholder-img"
                    alt="STUDENT">

                <h3>
                    STUDENT

                </h3>
                
                <span class="role-tag beta-tag">
                    BETA
                    
                </span>
                
            </button>

            <!-- SERVICE ORGANIZER -->
            <button
                id="organizerRoleBtn"
                class="role-card">
                <!--PLACEHOLDER IMG-->
                <img
                    src="twinkle.png"
                    class="role-placeholder-img"
                    alt="SERVICE ORGANIZER">

                <h3>
                    SERVICE ORGANIZER

                </h3>

                <span class="role-tag not-started-tag">
                    UNDER MAINTENANCE

                </span>

            </button>

        </div>

    </div>

</section>
    
<!-- =========================
LOGIN SECTION
========================= -->

<section 
    id="authSection" 
    class="contact-form-wrap login-box-dims auth-hidden">
    
<div class="form-header-align">

    <h2
        id="formHeading"
        class="panel-heading form-title-override">
        welcome back :)
    </h2>

    <span
        id="formSub"
        class="eyebrow panel-eyebrow-override">
        sign in with your school Google account ✦
    </span>

</div>

<div
    id="authNoticeBanner"
    class="contact-form-wrap auth-notice-banner-layout">
    
    <h4
        id="authNoticeTitle"
        class="panel-heading auth-notice-heading-layout">

    </h4>

    <p
        id="authNoticeDesc"
        class="auth-notice-desc-layout">
    </p>
</div>

<!-- =========================
LOGIN OPTIONS
========================= -->

<div class="login-options-container">


    <!-- STUDENT GOOGLE LOGIN -->

    <div class="login-option-card">


        <h3>
            🎓 Student Login
        </h3>


        <p>
            Sign in with your Rocklin student Google account ✦
        </p>



        <div
            id="g_id_onload"
            data-client_id="423428817974-s4oq7p4ehbkpn9dtrp1orosh8sbo9cnp.apps.googleusercontent.com"
            data-callback="handleGoogleLogin">
        </div>



        <div
            class="g_id_signin"
            data-type="standard"
            data-size="large"
            data-theme="filled_blue"
            data-text="continue_with"
            data-shape="rectangular">
        </div>



    </div>





    <!-- BETA LOGIN -->

    <div class="login-option-card beta-card">


        <h3>
            ✦ BETA TESTING
        </h3>



        <p>
            School Google login is currently unavailable.
            Test VOLUNTA using a personal email.
        </p>



        <input
            id="betaEmail"
            type="email"
            class="contact-input input-width-full"
            placeholder="your@email.com">



        <input
            id="betaPassword"
            type="password"
            class="contact-input input-width-full"
            placeholder="password">



        <button
            id="betaLoginBtn"
            class="btn-send">

            Beta Login

        </button>



    </div>


</div>

</section>
    
</main>

<script src="stars.js"></script>
    
<script src="login.js?v=5"></script>
</body>
    
</html>
