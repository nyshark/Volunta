<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Volunta - Organizer Dashboard
</title>

<link rel="stylesheet" href="style.css">
<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

</head>

<body>

<!-- Background -->

<div id="starCanvas"></div>
<div id="cloudCanvas"></div>

<!-- Navbar -->

<nav class="navbar">

<div class="navbar-left">

<button
id="menuToggleBtn"
class="filter-btn">
☰
</button>

<a
href="organizer-dashboard.html"
class="navbar-brand">

VOLUNTA

</a>

</div>

<div class="navbar-action-wrap">

<button
id="themeToggleBtn"
class="filter-btn">

⏾

</button>

<a
href="index.html"
class="nav-link">

Log Out

</a>

</div>

</nav>

<!-- Side Menu -->

<div
id="accountMenu"
class="account-menu">

<button
id="menuCloseBtn">

✕

</button>

<h3>

Organization

</h3>

<button
onclick="showTab('createTab')">

Create Opportunities

</button>

<button
onclick="showTab('opportunitiesTab')">

My Opportunities

</button>

<button
onclick="showTab('profileTab')">

Organization Profile

</button>

</div>

<main class="dashboard-main">

<div class="organizer-tabs">


<button
onclick="showTab('createTab')">

+ Create Service

</button>


<button
onclick="showTab('opportunitiesTab')">

My Services

</button>


<button
onclick="showTab('profileTab')">

Organization Profile

</button>


</div>

<!-- Create Opportunity -->

<section
id="createTab"
class="organizer-tab">

<div class="panel-header-block">

<h2 class="panel-heading">

Create a Service

</h2>

<span class="eyebrow">

Post a new volunteer opportunity.

</span>

</div>

<form
id="opportunityForm"
class="activities-logging-grid">

<div>

<label>Activity Title</label>

<input
id="oppTitle"
class="contact-input"
required>

</div>

<div>

<label>Organization</label>

<input
id="oppOrganization"
class="contact-input"
required>

</div>

<div>

<label>Address</label>

<input
id="oppAddress"
class="contact-input"
required>

</div>

<div>

<label>City</label>

<input
id="oppCity"
class="contact-input"
required>

</div>

<div>

<label>State</label>

<input
id="oppState"
class="contact-input"
required>

</div>

<div>

<label>Zip Code</label>

<input
id="oppZip"
class="contact-input"
required>

</div>

<div>

<label>Date</label>

<input
id="oppDate"
type="date"
class="contact-input"
required>

</div>

<div>

<label>Start Time</label>

<input
id="oppStart"
type="time"
class="contact-input"
required>

</div>

<div>

<label>End Time</label>

<input
id="oppEnd"
type="time"
class="contact-input"
required>

</div>

<div>

<label>Volunteer Limit</label>

<input
id="oppLimit"
type="number"
class="contact-input"
min="1"
required>

</div>

<div>

<label>Category</label>

<select
id="oppCategory"
class="contact-input">

<option>Environmental</option>

<option>Community</option>

<option>Animal Care</option>

<option>Food Bank</option>

<option>Education</option>

<option>Healthcare</option>

<option>Fundraising</option>

<option>Other</option>

</select>

</div>

<div>

<label>Minimum Age</label>

<input
id="oppAge"
type="number"
class="contact-input">

</div>

<div
style="grid-column:1/-1;">

<label>Description</label>

<textarea
id="oppDescription"
class="contact-input"
rows="6"></textarea>

</div>

<div
style="grid-column:1/-1;">

<label>
Banner Image
</label>

<p class="image-help">
Your image will be cropped into a banner.
<br>
Recommended ratio - 3:1
</p>

<input
id="oppImage"
type="file"
accept="image/*"
class="contact-input">


<div 
id="cropContainer"
class="crop-container"
style="display:none;">

<img 
id="imagePreview">

</div>


<button
type="button"
id="cropSaveBtn"
class="btn-send"
style="display:none;">

Save Banner Crop

</button>
</div>

<div
style="grid-column:1/-1; display:flex; gap:1rem;">


<button

type="button"

class="btn-send"

onclick="showTab('opportunitiesTab')">

← Back

</button>



<button
id="publishButton"
type="submit"
class="btn-send">

Publish Opportunity

</button>


</div>
</form>

</section>

<!-- My Opportunities -->

<section
id="opportunitiesTab"
class="organizer-tab"
style="display:none;">

<div class="panel-header-block dashboard-title-row">


<div>

<h2 class="panel-heading">

My Opportunities

</h2>


<span class="eyebrow">

Manage your volunteer events.

</span>


</div>



</div>


<button
class="btn-send"
onclick="showTab('createTab')">

+ Add Opportunity

</button>


<div id="opportunityList">

<!-- Cards appear here -->

</div>

</section>

<!-- Organization Profile -->

<section
id="profileTab"
class="organizer-tab"
style="display:none;">

<div class="panel-header-block">

<h2 class="panel-heading">

Organization Profile

</h2>

<span class="eyebrow">

Students will see this information.

</span>

</div>


<form
id="organizationProfileForm"
class="activities-logging-grid">



<div
style="grid-column:1/-1;">

<label>
Organization Name
</label>

<input
id="orgName"
class="contact-input">

</div>



<div
style="grid-column:1/-1;">

<label>
Mission Statement
</label>

<textarea
id="orgMission"
class="contact-input"
rows="5"></textarea>

</div>



<div>

<label>
Website
</label>

<input
id="orgWebsite"
class="contact-input">

</div>



<div>

<label>
Instagram
</label>

<input
id="orgInstagram"
class="contact-input">

</div>



<div>

<label>
TikTok
</label>

<input
id="orgTikTok"
class="contact-input">

</div>



<div
style="grid-column:1/-1;">

<label>
Organization Logo
</label>


<input
id="orgLogo"
type="file"
accept="image/*"
class="contact-input">


</div>



<button

type="submit"

class="btn-send"

style="grid-column:1/-1;">

Save Organization Profile

</button>


</form>


</section>

</main>

<footer class="site-footer footer-center">

<p>

-ˏ` ✶ ´ˎ-

</p>

</footer>

<script src="stars.js"></script>
<script src="menu.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script src="organizer-dashboard.js"></script>
</body>

</html>
